---
- name: Login to OpenShift on localhost
  command: >
    oc login {{ openshift_api_url }}
    --token={{ openshift_cluster_admin_token }}
    --insecure-skip-tls-verify=true

- name: Login to OpenShift on bastion
  command: >
    oc login {{ openshift_api_url }}
    --token={{ openshift_cluster_admin_token }}
    --insecure-skip-tls-verify=true
  delegate_to: bastion
