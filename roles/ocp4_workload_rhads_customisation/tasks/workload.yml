- name: "Load dynamic-plugins.yaml template"
  set_fact:
    dp_content: "{{ lookup('template', rhdh_dynamic_template) }}"
  tags:
    - test

- name: "Apply RHDH dynamic-plugins ConfigMap"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: "{{ ocp4_workload_rhads_customisation_rhdh_cm_name }}"
        namespace: "{{ ocp4_workload_rhads_customisation_rhdh_namespace }}"
        labels:
          app.kubernetes.io/managed-by: Helm
          rhdh.redhat.com/ext-config-sync: "true"
        annotations:
          meta.helm.sh/release-name: "{{ ocp4_workload_rhads_customisation_rhdh_namespace }}"
          meta.helm.sh/release-namespace: "{{ ocp4_workload_rhads_customisation_rhdh_namespace }}"
      data:
        dynamic-plugins.yaml: |
          {{ dp_content | indent(0) }}
  tags:
    - test

- name: Wait for RHDH deployment to be ready
  vars:
    rhdh_namespace: tssc-dh
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: backstage-developer-hub
    namespace: "{{ ocp4_workload_rhads_customisation_rhdh_namespace }}"
  until: rhdh_deploy_status_after.resources[0].status.availableReplicas == rhdh_deploy_status_after.resources[0].status.replicas
  retries: 60
  delay: 10
  register: rhdh_deploy_status_after
  tags:
    - test

- name: Restart Backstage deployment using oc
  ansible.builtin.command: >
    oc rollout restart deploy/backstage-developer-hub -n tssc-dh
  tags:
    - test

- name: Wait for RHDH deployment to be ready
  vars:
    rhdh_namespace: tssc-dh
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: backstage-developer-hub
    namespace: "{{ ocp4_workload_rhads_customisation_rhdh_namespace }}"
  until: rhdh_deploy_status_after.resources[0].status.availableReplicas == rhdh_deploy_status_after.resources[0].status.replicas
  retries: 60
  delay: 10
  register: rhdh_deploy_status_after
  tags:
    - test


# Enable the image puller in DevSpaces
- name: Get current DevSpaces CheCluster
  kubernetes.core.k8s_info:
    api_version: org.eclipse.che/v2
    kind: CheCluster
    name: devspaces
    namespace: openshift-devspaces
  register: current_checluster

# Note the image added to the imagePuller is found in the devfiles in
# https://github.com/opentraining-labs-customizations/tssc-developer-hub-configuration
# We could make this more intelligent in the future by having it check
# the imported repo in GitLab for the specific image in the devfiles there
- name: Patch DevSpaces CheCluster to enable imagePuller
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: org.eclipse.che/v2
      kind: CheCluster
      metadata:
        name: devspaces
        namespace: openshift-devspaces
      spec: >-
        {{
          current_checluster.resources[0].spec | combine({
            'components': (current_checluster.resources[0].spec.components | default({})) | combine({
              'imagePuller': {
                'enable': true,
                'spec': {
                  'images': 'udi=quay.io/devfile/universal-developer-image:ubi9-9b60f86'
                }
              }
            })
          }, recursive=True)
        }}
